# Exemplo: Nginx no Ubuntu, site em /var/www/piffer
# 1) Substitua SEU_DOMINIO e caminhos
# 2) sudo ln -s ... /etc/nginx/sites-enabled/
# 3) Aponte o DNS (registro A) para o IP deste servidor
# 4) sudo certbot --nginx -d SEU_DOMINIO

server {
    listen 80;
    server_name SEU_DOMINIO www.SEU_DOMINIO;
    root /var/www/piffer/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
